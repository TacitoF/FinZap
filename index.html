<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#07070e"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Finzap"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/icons/icon-192.png"/>
<title>Finzap</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#07070e;
  --s1:#0d0d1a;
  --s2:#121220;
  --s3:#181828;
  --b1:#1c1c30;
  --b2:#26263e;
  --b3:#32324e;
  --t1:#eeeef6;
  --t2:#9090b0;
  --t3:#50506a;
  --t4:#2c2c42;
  --vi:#5b5ef4;
  --vi2:#4245d6;
  --vi3:#2e31b8;
  --gr:#1db87a;
  --re:#f04060;
  --cy:#08b8d8;
  --am:#e8a020;
  --r:14px;--rs:10px;--rx:8px;
}
html,body{
  height:100%;background:var(--bg);
  font-family:'DM Sans',sans-serif;color:var(--t1);
  overflow:hidden;-webkit-font-smoothing:antialiased;
}
#app{
  display:flex;flex-direction:column;
  height:100%;max-width:430px;margin:0 auto;
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
}
.ic-stroke{fill:none;stroke-linecap:round;stroke-linejoin:round}

/* Header */
.hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 20px 14px;flex-shrink:0;
}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-wordmark{
  font-family:'DM Mono',monospace;font-size:18px;font-weight:500;
  letter-spacing:-0.3px;color:var(--t1);
}
.hdr-wordmark span{color:var(--vi)}
.hdr-month{
  font-family:'DM Mono',monospace;font-size:11px;
  color:var(--vi);background:rgba(91,94,244,.1);
  padding:5px 11px;border-radius:20px;
  border:1px solid rgba(91,94,244,.22);letter-spacing:.02em;
}

/* Balance */
.balance{
  margin:0 14px 14px;
  background:var(--s1);border:1px solid var(--b1);
  border-radius:var(--r);padding:18px 20px 16px;flex-shrink:0;
}
.balance-label{
  font-size:10px;color:var(--t3);
  text-transform:uppercase;letter-spacing:.12em;margin-bottom:6px;
}
.balance-amount{
  font-family:'DM Mono',monospace;font-size:30px;font-weight:500;
  color:var(--t1);letter-spacing:-1px;margin-bottom:14px;line-height:1;
}
.pills{display:flex;gap:7px;flex-wrap:wrap}
.pill{
  display:flex;align-items:center;gap:5px;
  font-size:11px;font-weight:400;padding:5px 10px;border-radius:20px;
}
.pill-g{background:rgba(29,184,122,.08);color:#5edda8;border:1px solid rgba(29,184,122,.18)}
.pill-r{background:rgba(240,64,96,.08);color:#f88898;border:1px solid rgba(240,64,96,.18)}
.pill-c{background:rgba(8,184,216,.08);color:#50d8f0;border:1px solid rgba(8,184,216,.18)}

/* Tabs */
.tabs{
  display:flex;gap:5px;padding:0 14px 10px;
  overflow-x:auto;flex-shrink:0;scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:400;
  padding:6px 13px;border-radius:20px;border:1px solid var(--b1);
  background:transparent;color:var(--t2);cursor:pointer;
  white-space:nowrap;transition:all .18s;flex-shrink:0;
}
.tab.active{background:var(--vi2);border-color:var(--vi2);color:#fff;font-weight:500}

/* List */
.sec-label{
  font-size:10px;color:var(--t4);text-transform:uppercase;
  letter-spacing:.12em;padding:0 20px 8px;flex-shrink:0;
}
.txn-list{
  flex:1;overflow-y:auto;padding:0 10px;
  scrollbar-width:thin;scrollbar-color:var(--b1) transparent;
}
.txn-list::-webkit-scrollbar{width:2px}
.txn-list::-webkit-scrollbar-thumb{background:var(--b1);border-radius:2px}

.empty{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:100%;gap:14px;
}
.empty-box{
  width:52px;height:52px;border-radius:14px;
  background:var(--s2);border:1px solid var(--b1);
  display:flex;align-items:center;justify-content:center;
}
.empty p{font-size:13px;text-align:center;line-height:1.55;max-width:190px;color:var(--t3)}

.txn{
  background:var(--s1);border:1px solid var(--b1);
  border-radius:var(--rs);padding:11px 13px;
  margin-bottom:7px;display:flex;align-items:center;gap:11px;
  animation:up .22s ease;
}
@keyframes up{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.txn-ic{
  width:38px;height:38px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.ic-bg-g{background:rgba(29,184,122,.1)}
.ic-bg-r{background:rgba(240,64,96,.1)}
.ic-bg-c{background:rgba(8,184,216,.1)}
.txn-body{flex:1;min-width:0}
.txn-name{font-size:13px;font-weight:500;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.txn-sub{font-size:11px;color:var(--t2);margin-top:2px}
.txn-right{text-align:right;flex-shrink:0}
.txn-val{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--t1)}
.badges{display:flex;gap:4px;margin-top:4px;justify-content:flex-end}
.bdg{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:500}
.bdg-g{background:rgba(29,184,122,.1);color:#5edda8}
.bdg-r{background:rgba(240,64,96,.1);color:#f88898}
.bdg-c{background:rgba(8,184,216,.1);color:#50d8f0}
.bdg-a{background:rgba(232,160,32,.1);color:#f0c060}

/* Chat */
.chat-area{padding:10px 12px 5px;flex-shrink:0}
.bubble{
  background:var(--s2);border:1px solid var(--b1);
  border-radius:13px 13px 13px 3px;
  padding:10px 13px;font-size:13px;color:var(--t2);line-height:1.5;
  margin-bottom:7px;
}
.bubble b{color:var(--vi);font-weight:500}
.bubble-user{
  background:rgba(91,94,244,.07);border-color:rgba(91,94,244,.18);
  border-radius:13px 13px 3px 13px;color:var(--t1);margin-left:36px;
}
.dots{display:none;align-items:center;gap:4px;padding:8px 13px}
.dots.on{display:flex}
.dot{width:6px;height:6px;border-radius:50%;background:var(--vi);animation:bnc 1.1s infinite}
.dot:nth-child(2){animation-delay:.14s}
.dot:nth-child(3){animation-delay:.28s}
@keyframes bnc{0%,100%{transform:translateY(0);opacity:.35}50%{transform:translateY(-5px);opacity:1}}

/* Input */
.input-row{
  display:flex;gap:7px;align-items:flex-end;
  padding:5px 12px 13px;flex-shrink:0;
}
textarea.inp{
  flex:1;background:var(--s2);border:1px solid var(--b1);
  border-radius:20px;padding:11px 15px;
  font-size:14px;color:var(--t1);font-family:'DM Sans',sans-serif;
  outline:none;resize:none;min-height:44px;max-height:96px;
  line-height:1.4;transition:border-color .18s;
}
textarea.inp::placeholder{color:var(--t4)}
textarea.inp:focus{border-color:var(--b3)}
.btn{
  width:44px;height:44px;border-radius:50%;border:none;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;transition:all .18s;
}
.btn-send{background:var(--vi2)}
.btn-send:active{transform:scale(.93)}

/* Toast */
.toast{
  position:fixed;
  top:calc(env(safe-area-inset-top) + 54px);
  left:50%;transform:translateX(-50%) translateY(-6px);
  background:#0f2219;border:1px solid rgba(29,184,122,.25);
  color:#5edda8;font-size:12px;font-weight:500;
  padding:9px 16px;border-radius:20px;
  white-space:nowrap;opacity:0;transition:all .28s;
  pointer-events:none;z-index:100;
  display:flex;align-items:center;gap:7px;
}
.toast.err{background:#200f14;border-color:rgba(240,64,96,.25);color:#f88898}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <div class="hdr">
    <div class="hdr-left">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="8" fill="#5b5ef4" fill-opacity=".14"/>
        <rect x="7" y="8" width="14" height="2.5" rx="1.25" fill="#5b5ef4"/>
        <path d="M19 8.8L9 19.2" stroke="#5b5ef4" stroke-width="2" stroke-linecap="round"/>
        <rect x="7" y="17.5" width="14" height="2.5" rx="1.25" fill="#5b5ef4"/>
      </svg>
      <div class="hdr-wordmark">fin<span>zap</span></div>
    </div>
    <div class="hdr-month" id="cur-month">--/----</div>
  </div>

  <!-- Balance -->
  <div class="balance">
    <div class="balance-label">Total do mês</div>
    <div class="balance-amount" id="total">R$ 0,00</div>
    <div class="pills">
      <div class="pill pill-g">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M6 2v8M3.5 7.5L6 10l2.5-2.5M3.5 4.5L6 2l2.5 2.5" stroke="#1db87a" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Débito&nbsp;<span id="tot-deb">R$ 0,00</span>
      </div>
      <div class="pill pill-r">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <rect x="1" y="3" width="10" height="7" rx="1.5" stroke="#f04060" stroke-width="1.2" fill="none"/>
          <path d="M1 5.5h10" stroke="#f04060" stroke-width="1.2"/>
          <rect x="2.5" y="7" width="2.5" height="1.2" rx=".6" fill="#f04060"/>
        </svg>
        Crédito&nbsp;<span id="tot-cred">R$ 0,00</span>
      </div>
      <div class="pill pill-c">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M7 1.5L4.5 6H7.5L5 10.5" stroke="#08b8d8" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Pix&nbsp;<span id="tot-pix">R$ 0,00</span>
      </div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" data-f="todos">Todos</button>
    <button class="tab" data-f="debito">Débito</button>
    <button class="tab" data-f="credito">Crédito</button>
    <button class="tab" data-f="pix">Pix</button>
  </div>

  <div class="sec-label">Transações</div>

  <!-- List -->
  <div class="txn-list" id="txn-list">
    <div class="empty" id="empty">
      <div class="empty-box">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" stroke="#50506a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <path d="M8 10h8M8 14h5" stroke="#50506a" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <p>Mande sua primeira compra para começar</p>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat-area">
    <div class="bubble" id="ai-bubble">
      Oi! Sou o <b>Finzap</b>. Me conta sua compra — pode digitar ou gravar.
    </div>
    <div class="dots" id="dots">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-row">
    <textarea class="inp" id="msg" placeholder='Ex: "200 no débito no mercado"' rows="1"></textarea>

    <button class="btn btn-send" id="btn-send" aria-label="Enviar">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M2.5 9h13M9 2.5l6.5 6.5L9 15.5" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <svg width="14" height="14" viewBox="0 0 14 14" fill="none" id="toast-icon">
    <path d="M2 7l3.5 3.5L12 4" stroke="#5edda8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </svg>
  <span id="toast-msg"></span>
</div>

<script>
const CLAUDE_MODEL = "claude-haiku-4-5-20251001";
const SHEETS_URL   = "https://script.google.com/macros/s/AKfycbxTTSsjsXUWidIsRUcRQGKLiHgYCALPex7fyXVY_e2ttVTwAjNHKvRb_tPYaIFjnPJWAg/exec";
const CLAUDE_URL   = "/api/claude";   // proxy seguro — chave fica no servidor

const SYS = `Você é um assistente financeiro. Analise a mensagem e extraia os dados da compra.
Responda APENAS com JSON válido, sem markdown, sem explicação, no formato:
{"produto":"nome","valor":123.45,"tipo":"debito|credito|pix","parcelas":1,"mesAno":"MM/YYYY"}
Regras:
- tipo: exatamente debito, credito ou pix
- parcelas: 1 se à vista, número se parcelado
- valor: total da compra
- mesAno: mês/ano atual em MM/YYYY
Se não for uma compra retorne: {"erro":"nao entendi"}`;

const MO = ['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];
const now = new Date();
let tots = {debito:0,credito:0,pix:0};
let txns = [];
let fil  = 'todos';

document.getElementById('cur-month').textContent = MO[now.getMonth()]+'/'+now.getFullYear();
if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});

function fmt(v){
  return 'R$ '+v.toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.');
}

function updateTotals(){
  const t = tots.debito+tots.credito+tots.pix;
  document.getElementById('total').textContent    = fmt(t);
  document.getElementById('tot-deb').textContent  = fmt(tots.debito);
  document.getElementById('tot-cred').textContent = fmt(tots.credito);
  document.getElementById('tot-pix').textContent  = fmt(tots.pix);
}

function setBubble(html){ document.getElementById('ai-bubble').innerHTML = html; }

function toast(msg, err=false){
  const el = document.getElementById('toast');
  const ico = document.getElementById('toast-icon');
  document.getElementById('toast-msg').textContent = msg;
  ico.innerHTML = err
    ? `<path d="M2 2l10 10M12 2L2 12" stroke="#f88898" stroke-width="1.6" stroke-linecap="round" fill="none"/>`
    : `<path d="M2 7l3.5 3.5L12 4" stroke="#5edda8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>`;
  el.className='toast'+(err?' err':'')+' on';
  setTimeout(()=>el.classList.remove('on'),2800);
}

function txnSVG(tipo){
  const cols = {debito:'#1db87a',credito:'#f04060',pix:'#08b8d8'};
  const bgs  = {debito:'ic-bg-g',credito:'ic-bg-r',pix:'ic-bg-c'};
  const c    = cols[tipo]||'#9090b0';
  const bg   = bgs[tipo]||'ic-bg-g';
  const paths = {
    debito: `<path d="M10 4v8M7 9l3 3 3-3M7 7l3-3 3 3" stroke="${c}" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`,
    credito:`<rect x="3" y="5" width="14" height="10" rx="2" stroke="${c}" stroke-width="1.4" fill="none"/><path d="M3 8.5h14" stroke="${c}" stroke-width="1.4"/><rect x="5" y="10.5" width="3.5" height="1.8" rx=".9" fill="${c}"/>`,
    pix:    `<path d="M11 3.5L8 10h3.5L9 16.5" stroke="${c}" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`
  };
  return {bg, svg:`<svg width="20" height="20" viewBox="0 0 20 20" fill="none">${paths[tipo]||paths.debito}</svg>`};
}

function bdgInfo(tipo){
  return {debito:['Débito','bdg-g'],credito:['Crédito','bdg-r'],pix:['Pix','bdg-c']}[tipo]||['Outro','bdg-g'];
}

function render(){
  const list  = document.getElementById('txn-list');
  const empty = document.getElementById('empty');
  const vis   = fil==='todos' ? txns : txns.filter(t=>t.tipo===fil);

  if(!vis.length){
    list.innerHTML='';
    list.appendChild(empty);
    empty.style.display='flex';
    return;
  }
  empty.style.display='none';
  list.innerHTML='';

  [...vis].reverse().forEach(t=>{
    const {bg,svg} = txnSVG(t.tipo);
    const [lbl,cls] = bdgInfo(t.tipo);
    const sub = t.parcelas>1?`Parcela 1/${t.parcelas} · ${t.mesAno}`:t.mesAno;
    const el = document.createElement('div');
    el.className='txn';
    el.innerHTML=`
      <div class="txn-ic ${bg}">${svg}</div>
      <div class="txn-body">
        <div class="txn-name">${t.produto}</div>
        <div class="txn-sub">${sub}</div>
      </div>
      <div class="txn-right">
        <div class="txn-val">-${fmt(t.valor)}</div>
        <div class="badges">
          <span class="bdg ${cls}">${lbl}</span>
          ${t.parcelas>1?`<span class="bdg bdg-a">${t.parcelas}x</span>`:''}
        </div>
      </div>`;
    list.appendChild(el);
  });
}

async function processar(txt){
  const w  = document.querySelector('.chat-area');
  const ub = document.createElement('div');
  ub.className='bubble bubble-user';
  ub.textContent=txt;
  w.appendChild(ub);
  setTimeout(()=>ub.remove(),6000);

  document.getElementById('dots').classList.add('on');

  try{
    const r = await fetch(CLAUDE_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:CLAUDE_MODEL,max_tokens:300,
        system:SYS,
        messages:[{role:'user',content:txt}]
      })
    });
    const data = await r.json();
    document.getElementById('dots').classList.remove('on');

    const raw    = data.content?.[0]?.text||'{}';
    const parsed = JSON.parse(raw.replace(/```json|```/g,'').trim());

    if(parsed.erro){
      setBubble(`Não entendi. Tente: <b>"paguei 200 no cartão em 3x na Renner"</b>`);
      return;
    }

    txns.push(parsed);
    tots[parsed.tipo]=(tots[parsed.tipo]||0)+parsed.valor;
    updateTotals();
    render();

    const pm = parsed.parcelas>1
      ? `, em <b>${parsed.parcelas}x</b> de <b>${fmt(parsed.valor/parsed.parcelas)}</b>` : '';
    setBubble(`Anotado. <b>${parsed.produto}</b> — <b>${fmt(parsed.valor)}</b>${pm} no <b>${bdgInfo(parsed.tipo)[0]}</b>.`);

    salvar(parsed,txt);

  }catch(e){
    document.getElementById('dots').classList.remove('on');
    setBubble('Erro ao processar. Verifique sua conexão.');
  }
}

async function salvar(dados,msg){
  try{
    await fetch(SHEETS_URL,{
      method:'POST',mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({...dados,mensagem:msg})
    });
    toast('Salvo no Google Sheets');
  }catch(e){ toast('Erro ao salvar',true); }
}

function enviar(){
  const el  = document.getElementById('msg');
  const txt = el.value.trim();
  if(!txt) return;
  el.value=''; el.style.height='';
  processar(txt);
}

document.getElementById('btn-send').addEventListener('click',enviar);
document.getElementById('msg').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();enviar();}
});
document.getElementById('msg').addEventListener('input',function(){
  this.style.height='';
  this.style.height=Math.min(this.scrollHeight,96)+'px';
});

document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    fil=t.dataset.f;
    render();
  });
});

// fim
</script>
</body>
</html>
