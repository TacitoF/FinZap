<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#07070e"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Finzap"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/icons/icon-192.png"/>
<title>Finzap</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#07070e; --s1:#0d0d1a; --s2:#121220; --s3:#181828;
  --b1:#1c1c30; --b2:#26263e; --b3:#32324e;
  --t1:#eeeef6; --t2:#9090b0; --t3:#50506a; --t4:#2c2c42;
  --vi:#5b5ef4; --vi2:#4245d6;
  --gr:#1db87a; --re:#f04060; --cy:#08b8d8; --am:#e8a020;
  --r:14px; --rs:10px;
}
html,body{
  height:100%; background:var(--bg); font-family:'DM Sans',sans-serif; color:var(--t1);
  overflow:hidden; -webkit-font-smoothing:antialiased;
}
#app{
  display:flex; flex-direction:column; height:100%; max-width:430px; margin:0 auto;
  padding-top:env(safe-area-inset-top); padding-bottom:env(safe-area-inset-bottom);
}

/* Header & Month Nav */
.hdr{
  display:flex; align-items:center; justify-content:space-between;
  padding:20px 20px 14px; flex-shrink:0;
}
.hdr-left{display:flex; align-items:center; gap:10px}
.hdr-wordmark{ font-family:'DM Mono',monospace; font-size:18px; font-weight:500; letter-spacing:-0.3px; }
.hdr-wordmark span{color:var(--vi)}
.hdr-nav{
  display:flex; align-items:center; background:rgba(91,94,244,.1);
  border-radius:24px; border:1px solid rgba(91,94,244,.22); overflow:hidden;
}
.nav-btn{
  background:none; border:none; color:var(--vi); padding:12px 18px; /* Aumentado para Mobile */
  cursor:pointer; display:flex; align-items:center; justify-content:center; transition: background 0.2s;
}
.nav-btn svg { width:14px; height:14px; }
.nav-btn:active{background:rgba(91,94,244,.25)}
.hdr-month{
  font-family:'DM Mono',monospace; font-size:12px; color:var(--vi);
  padding:0 4px; letter-spacing:.02em; font-weight:500; min-width:60px; text-align:center;
}

/* Balance */
.balance{
  margin:0 14px 14px; background:var(--s1); border:1px solid var(--b1);
  border-radius:var(--r); padding:18px 20px 16px; flex-shrink:0; position:relative;
}
.balance-top{ display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:6px; }
.balance-label{ font-size:10px; color:var(--t3); text-transform:uppercase; letter-spacing:.12em; }
.salary-btn{
  font-size:10px; color:var(--vi); cursor:pointer; background:rgba(91,94,244,.1);
  padding:6px 10px; border-radius:6px; font-weight:500; text-transform:uppercase;
}
.balance-amount{
  font-family:'DM Mono',monospace; font-size:30px; font-weight:500;
  letter-spacing:-1px; margin-bottom:14px; line-height:1; transition:color 0.3s;
}
.balance-amount.neg{ color:var(--re); }
.pills{display:flex; gap:7px; flex-wrap:wrap}
.pill{ display:flex; align-items:center; gap:5px; font-size:11px; padding:5px 10px; border-radius:20px; }
.pill-g{background:rgba(29,184,122,.08); color:#5edda8; border:1px solid rgba(29,184,122,.18)}
.pill-r{background:rgba(240,64,96,.08); color:#f88898; border:1px solid rgba(240,64,96,.18)}
.pill-c{background:rgba(8,184,216,.08); color:#50d8f0; border:1px solid rgba(8,184,216,.18)}

/* Sync Loader Pequeno (Header) */
.syncing{
  position:absolute; top:18px; right:20px;
  width:14px; height:14px; border:2px solid var(--b3); border-top-color:var(--vi);
  border-radius:50%; animation:spin .8s linear infinite; display:none;
}
.syncing.on{display:block}
@keyframes spin{to{transform:rotate(360deg)}}

/* Tabs */
.tabs{
  display:flex; gap:5px; padding:0 14px 10px; overflow-x:auto; flex-shrink:0; scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  font-family:'DM Sans',sans-serif; font-size:12px; padding:8px 14px; border-radius:20px;
  border:1px solid var(--b1); background:transparent; color:var(--t2); cursor:pointer;
  white-space:nowrap; transition:all .18s; flex-shrink:0;
}
.tab.active{background:var(--vi2); border-color:var(--vi2); color:#fff; font-weight:500}
.tab.tab-special{ border-color:rgba(91,94,244,.3); color:var(--vi); }
.tab.tab-special.active{ background:var(--vi); color:#fff; border-color:var(--vi); }
.tab-icon { display:inline-block; vertical-align:middle; margin-top:-2px; margin-right:4px; }

/* Main Content Area */
.content-area{ flex:1; overflow-y:auto; position:relative; scrollbar-width:none; }
.sec-label{ font-size:10px; color:var(--t4); text-transform:uppercase; letter-spacing:.12em; padding:0 20px 8px; }

/* Separando Lista, Empty e Loading */
.txn-list{ padding:0 10px; display:block; }

.empty{ display:none; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:14px; padding-top:40px;}
.empty-box{ width:52px; height:52px; border-radius:14px; background:var(--s2); border:1px solid var(--b1); display:flex; align-items:center; justify-content:center; }
.empty p{font-size:13px; text-align:center; line-height:1.55; max-width:190px; color:var(--t3)}

/* Loading State Gigante */
.loading-state { display:none; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:16px; padding-top:40px; }
.loading-dots { display:flex; gap:6px; }
.loading-state .dot { width:10px; height:10px; border-radius:50%; background:var(--vi); animation:bnc 1s infinite; }
.loading-state .dot:nth-child(2) { animation-delay:0.15s; }
.loading-state .dot:nth-child(3) { animation-delay:0.3s; }
.loading-text { font-size:13px; color:var(--t3); letter-spacing:0.5px; }

/* Transactions */
.txn{
  background:var(--s1); border:1px solid var(--b1); border-radius:var(--rs); padding:11px 13px;
  margin-bottom:7px; display:flex; align-items:center; gap:11px; animation:up .22s ease;
}
@keyframes up{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.txn-ic{ width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.ic-bg-g{background:rgba(29,184,122,.1)} .ic-bg-r{background:rgba(240,64,96,.1)} .ic-bg-c{background:rgba(8,184,216,.1)}
.txn-body{flex:1; min-width:0}
.txn-name{font-size:13px; font-weight:500; color:var(--t1); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.txn-sub{font-size:11px; color:var(--t2); margin-top:2px}
.txn-right{text-align:right; flex-shrink:0}
.txn-val{font-family:'DM Mono',monospace; font-size:13px; font-weight:500;}
.badges{display:flex; gap:4px; margin-top:4px; justify-content:flex-end}
.bdg{font-size:10px; padding:2px 7px; border-radius:8px; font-weight:500}
.bdg-g{background:rgba(29,184,122,.1); color:#5edda8}
.bdg-r{background:rgba(240,64,96,.1); color:#f88898}
.bdg-c{background:rgba(8,184,216,.1); color:#50d8f0}
.bdg-a{background:rgba(232,160,32,.1); color:#f0c060}

/* Dashboard (Resumo) */
#dashboard{ display:none; padding:0 14px 20px; animation:up .3s ease; }
#dashboard.active{ display:block; }
.dash-card{ background:var(--s1); border:1px solid var(--b1); border-radius:var(--r); padding:16px; margin-bottom:10px; }
.chart-container{ display:flex; align-items:center; gap:20px; }
.chart-svg{ width:90px; height:90px; transform:rotate(-90deg); overflow:visible; }
.chart-circle{ fill:none; stroke-width:14; stroke-linecap:round; transition:stroke-dasharray 0.8s ease-out; }
.chart-bg{ stroke:var(--b2); }
.chart-info{ flex:1; }
.chart-perc{ font-family:'DM Mono',monospace; font-size:24px; font-weight:500; color:var(--vi); line-height:1; }
.chart-lbl{ font-size:11px; color:var(--t2); margin-top:4px; }
.kpi-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px; }
.kpi-box{ background:var(--s2); border:1px solid var(--b1); border-radius:var(--rs); padding:12px; }
.kpi-val{ font-family:'DM Mono',monospace; font-size:14px; font-weight:500; margin-top:4px; color:var(--t1); }
.kpi-tit{ font-size:10px; color:var(--t3); text-transform:uppercase; letter-spacing:.05em; }

/* Chat */
.chat-area{padding:10px 12px 5px; flex-shrink:0; background:var(--bg); border-top:1px solid var(--s1);}
.bubble{
  background:var(--s2); border:1px solid var(--b1); border-radius:13px 13px 13px 3px;
  padding:10px 13px; font-size:13px; color:var(--t2); line-height:1.5; margin-bottom:7px;
}
.bubble b{color:var(--vi); font-weight:500}
.bubble-user{ background:rgba(91,94,244,.07); border-color:rgba(91,94,244,.18); border-radius:13px 13px 3px 13px; color:var(--t1); margin-left:36px; }
.dots{display:none; align-items:center; gap:4px; padding:8px 13px}
.dots.on{display:flex}
.chat-area .dot{width:6px; height:6px; border-radius:50%; background:var(--vi); animation:bnc 1.1s infinite}
.chat-area .dot:nth-child(2){animation-delay:.14s} .chat-area .dot:nth-child(3){animation-delay:.28s}
@keyframes bnc{0%,100%{transform:translateY(0);opacity:.35}50%{transform:translateY(-5px);opacity:1}}

/* Input */
.input-row{ display:flex; gap:7px; align-items:flex-end; padding:5px 12px 13px; flex-shrink:0; background:var(--bg); }
textarea.inp{
  flex:1; background:var(--s2); border:1px solid var(--b1); border-radius:20px; padding:11px 15px;
  font-size:14px; color:var(--t1); font-family:'DM Sans',sans-serif; outline:none; resize:none;
  min-height:44px; max-height:96px; line-height:1.4; transition:border-color .18s;
}
textarea.inp::placeholder{color:var(--t4)}
textarea.inp:focus{border-color:var(--b3)}
.btn{ width:44px; height:44px; border-radius:50%; border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; transition:all .18s; }
.btn-send{background:var(--vi2)} .btn-send:active{transform:scale(.93)}

/* Toast */
.toast{
  position:fixed; top:calc(env(safe-area-inset-top) + 54px); left:50%; transform:translateX(-50%) translateY(-6px);
  background:#0f2219; border:1px solid rgba(29,184,122,.25); color:#5edda8; font-size:12px; font-weight:500;
  padding:9px 16px; border-radius:20px; white-space:nowrap; opacity:0; transition:all .28s; pointer-events:none; z-index:100; display:flex; align-items:center; gap:7px;
}
.toast.err{background:#200f14; border-color:rgba(240,64,96,.25); color:#f88898}
.toast.on{opacity:1; transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <div class="hdr">
    <div class="hdr-left">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="8" fill="#5b5ef4" fill-opacity=".14"/>
        <rect x="7" y="8" width="14" height="2.5" rx="1.25" fill="#5b5ef4"/>
        <path d="M19 8.8L9 19.2" stroke="#5b5ef4" stroke-width="2" stroke-linecap="round"/>
        <rect x="7" y="17.5" width="14" height="2.5" rx="1.25" fill="#5b5ef4"/>
      </svg>
      <div class="hdr-wordmark">fin<span>zap</span></div>
    </div>
    
    <div class="hdr-nav">
      <button class="nav-btn" onclick="mudarMes(-1)" aria-label="Mês Anterior">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="hdr-month" id="cur-month">--/----</div>
      <button class="nav-btn" onclick="mudarMes(1)" aria-label="Próximo Mês">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </div>
  </div>

  <!-- Balance -->
  <div class="balance">
    <div class="syncing" id="sync-icon"></div>
    <div class="balance-top">
      <div class="balance-label">Saldo Disponível</div>
      <div class="salary-btn" onclick="editarSalario()">✎ Renda</div>
    </div>
    
    <div class="balance-amount" id="total">R$ 0,00</div>
    <div class="pills">
      <div class="pill pill-g">Débito <span id="tot-deb">R$ 0,00</span></div>
      <div class="pill pill-r">Crédito <span id="tot-cred">R$ 0,00</span></div>
      <div class="pill pill-c">Pix <span id="tot-pix">R$ 0,00</span></div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" data-f="todos">Lista</button>
    <button class="tab" data-f="debito">Débito</button>
    <button class="tab" data-f="credito">Crédito</button>
    <button class="tab" data-f="pix">Pix</button>
    <button class="tab tab-special" data-f="resumo">
      <svg class="tab-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
      Resumo
    </button>
  </div>

  <div class="content-area">
    
    <!-- Carregando (Visível ao mudar de mês) -->
    <div class="loading-state" id="loading-state">
      <div class="loading-dots">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
      <div class="loading-text">Buscando dados...</div>
    </div>

    <!-- Empty State (Separado da Lista) -->
    <div class="empty" id="empty">
      <div class="empty-box">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" stroke="#50506a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M8 10h8M8 14h5" stroke="#50506a" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <p>Nenhum gasto encontrado.<br>Mande sua primeira compra!</p>
    </div>

    <!-- List -->
    <div class="txn-list" id="txn-list"></div>

    <!-- Dashboard -->
    <div id="dashboard">
      <div class="dash-card">
        <div class="chart-container">
          <svg class="chart-svg" viewBox="0 0 100 100">
            <circle class="chart-circle chart-bg" cx="50" cy="50" r="40"></circle>
            <circle class="chart-circle" id="chart-prog" cx="50" cy="50" r="40" stroke="#5b5ef4" stroke-dasharray="0 251.2"></circle>
          </svg>
          <div class="chart-info">
            <div class="chart-perc" id="dash-perc">0%</div>
            <div class="chart-lbl">da renda comprometida</div>
          </div>
        </div>
      </div>
      
      <div class="kpi-grid">
        <div class="kpi-box">
          <div class="kpi-tit">Total Gasto</div>
          <div class="kpi-val" id="dash-gasto">R$ 0,00</div>
        </div>
        <div class="kpi-box">
          <div class="kpi-tit">Maior Compra</div>
          <div class="kpi-val" id="dash-maior" style="color:var(--t2)">Nenhuma</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat-area">
    <div class="bubble" id="ai-bubble">Oi! Sou o <b>Finzap</b>. Me conta sua compra.</div>
    <div class="dots" id="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  </div>

  <!-- Input -->
  <div class="input-row">
    <textarea class="inp" id="msg" placeholder='Ex: "200 no crédito no mercado"' rows="1"></textarea>
    <button class="btn btn-send" id="btn-send">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M2.5 9h13M9 2.5l6.5 6.5L9 15.5" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast">
  <svg width="14" height="14" viewBox="0 0 14 14" fill="none" id="toast-icon">
    <path d="M2 7l3.5 3.5L12 4" stroke="#5edda8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  <span id="toast-msg"></span>
</div>

<script>
const CLAUDE_MODEL = "claude-haiku-4-5-20251001";
const SHEETS_URL   = "https://script.google.com/macros/s/AKfycbxTTSsjsXUWidIsRUcRQGKLiHgYCALPex7fyXVY_e2ttVTwAjNHKvRb_tPYaIFjnPJWAg/exec";
const CLAUDE_URL   = "/api/claude";

let dataVisualizacao = new Date(); // Controla qual mês estamos vendo
let txns = [];
let fil  = 'todos';
let salario = parseFloat(localStorage.getItem('finzap_salario')) || 0;

if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});

// ================= FUNÇÕES DE APOIO E NORMALIZAÇÃO =================

function strMesAno(dataObj) {
  const m = String(dataObj.getMonth() + 1).padStart(2, '0');
  const a = dataObj.getFullYear();
  return m + '/' + a;
}

function fmt(v){ return 'R$ '+v.toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.'); }

// Remove acentos, espaços e deixa tudo minúsculo para não quebrar os filtros das abas
function normalizarTipo(tipo) {
  if (!tipo) return 'debito';
  let t = String(tipo).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
  return ['debito', 'credito', 'pix'].includes(t) ? t : 'debito';
}

// ================= NAVEGAÇÃO E SINCRONIZAÇÃO =================

function mudarMes(offset) {
  dataVisualizacao.setMonth(dataVisualizacao.getMonth() + offset);
  carregarDadosDaPlanilha();
}

async function carregarDadosDaPlanilha() {
  const mesReq = strMesAno(dataVisualizacao);
  document.getElementById('cur-month').textContent = mesReq;
  
  // Exibe a tela de carregamento forte e esconde os outros painéis
  document.getElementById('txn-list').style.display = 'none';
  document.getElementById('empty').style.display = 'none';
  document.getElementById('dashboard').classList.remove('active');
  document.getElementById('loading-state').style.display = 'flex';
  document.getElementById('sync-icon').classList.add('on');
  
  try {
    const r = await fetch(`${SHEETS_URL}?mes=${encodeURIComponent(mesReq)}`);
    const data = await r.json();
    
    if (data.ok && data.mes === mesReq) {
      txns = (data.transacoes || []).map(t => ({
        ...t,
        tipo: normalizarTipo(t.tipo)
      }));
    } else {
      txns = [];
    }
  } catch(e) {
    console.error("Erro ao sincronizar", e);
    txns = []; 
  }
  
  document.getElementById('sync-icon').classList.remove('on');
  document.getElementById('loading-state').style.display = 'none';
  
  // Respeita a aba que o usuário deixou selecionada
  if (fil === 'resumo') {
    document.getElementById('dashboard').classList.add('active');
  } else {
    renderizarTudo();
  }
}

// Inicia o app carregando o mês atual
carregarDadosDaPlanilha();

// ================= REGRAS DE NEGÓCIO E RENDERIZAÇÃO =================

function editarSalario() {
  let val = prompt("Qual a sua renda ou limite deste mês?", salario > 0 ? salario : "");
  if (val !== null && val.trim() !== "") {
    let num = parseFloat(val.replace(/[^\d.,]/g, '').replace(',', '.'));
    if (!isNaN(num)) {
      salario = num;
      localStorage.setItem('finzap_salario', salario);
      renderizarTudo();
    }
  }
}

function renderizarTudo() {
  // 1. Recalcula totais
  let tots = {debito:0, credito:0, pix:0};
  let maiorCompra = {produto: "Nenhuma", valor: 0};

  txns.forEach(t => {
    tots[t.tipo] = (tots[t.tipo] || 0) + t.valor;
    if(t.valor > maiorCompra.valor) maiorCompra = t;
  });

  const gastos = tots.debito + tots.credito + tots.pix;
  const saldo = salario - gastos;

  // 2. Atualiza cabeçalho (Balance)
  const elTotal = document.getElementById('total');
  elTotal.textContent = fmt(saldo);
  elTotal.className = 'balance-amount ' + (saldo < 0 ? 'neg' : '');
  
  document.getElementById('tot-deb').textContent  = fmt(tots.debito);
  document.getElementById('tot-cred').textContent = fmt(tots.credito);
  document.getElementById('tot-pix').textContent  = fmt(tots.pix);

  // 3. Atualiza Dashboard (Resumo)
  let perc = 0;
  if(salario > 0) perc = Math.min(100, Math.round((gastos / salario) * 100));
  
  document.getElementById('dash-perc').textContent = perc + '%';
  document.getElementById('dash-gasto').textContent = fmt(gastos);
  
  if(maiorCompra.valor > 0) {
    document.getElementById('dash-maior').textContent = maiorCompra.produto + ' (' + fmt(maiorCompra.valor) + ')';
    document.getElementById('dash-maior').style.color = 'var(--t1)';
  } else {
    document.getElementById('dash-maior').textContent = 'Nenhuma';
    document.getElementById('dash-maior').style.color = 'var(--t2)';
  }

  // Anima o arco do gráfico (Perímetro = 251.2)
  const arcoDash = (perc / 100) * 251.2;
  const corGrafico = perc >= 90 ? '#f04060' : (perc >= 70 ? '#e8a020' : '#5b5ef4');
  const chartCircle = document.getElementById('chart-prog');
  chartCircle.setAttribute('stroke-dasharray', `${arcoDash} 251.2`);
  chartCircle.setAttribute('stroke', corGrafico);

  // 4. Renderiza Lista de Transações
  const list  = document.getElementById('txn-list');
  const empty = document.getElementById('empty');
  const vis   = fil==='todos' ? txns : txns.filter(t=>t.tipo===fil);

  // Limpa a lista (agora é seguro pois a div #empty está do lado de fora)
  list.innerHTML=''; 

  if(!vis.length){
    list.style.display = 'none';
    empty.style.display = 'flex';
    return;
  }
  
  empty.style.display = 'none';
  list.style.display = 'block';

  // Inverte para os mais novos no topo
  [...vis].reverse().forEach(t=>{
    const c = {debito:'#1db87a', credito:'#f04060', pix:'#08b8d8'}[t.tipo] || '#9090b0';
    const bg = {debito:'ic-bg-g', credito:'ic-bg-r', pix:'ic-bg-c'}[t.tipo] || 'ic-bg-g';
    const svgs = {
      debito: `<path d="M10 4v8M7 9l3 3 3-3M7 7l3-3 3 3" stroke="${c}" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`,
      credito:`<rect x="3" y="5" width="14" height="10" rx="2" stroke="${c}" stroke-width="1.4" fill="none"/><path d="M3 8.5h14" stroke="${c}" stroke-width="1.4"/><rect x="5" y="10.5" width="3.5" height="1.8" rx=".9" fill="${c}"/>`,
      pix:    `<path d="M11 3.5L8 10h3.5L9 16.5" stroke="${c}" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`
    };
    const bdgs = {debito:['Débito','bdg-g'], credito:['Crédito','bdg-r'], pix:['Pix','bdg-c']}[t.tipo] || ['Outro','bdg-g'];
    
    const sub = t.parcelas>1 ? `Parcela ${t.parcelaNum||1}/${t.parcelas} · ${t.data||t.mesAno}` : (t.data||t.mesAno);
    const el = document.createElement('div');
    el.className='txn';
    el.innerHTML=`
      <div class="txn-ic ${bg}"><svg width="20" height="20" viewBox="0 0 20 20" fill="none">${svgs[t.tipo]}</svg></div>
      <div class="txn-body">
        <div class="txn-name">${t.produto}</div>
        <div class="txn-sub">${sub}</div>
      </div>
      <div class="txn-right">
        <div class="txn-val">-${fmt(t.valor)}</div>
        <div class="badges">
          <span class="bdg ${bdgs[1]}">${bdgs[0]}</span>
          ${t.parcelas>1 ? `<span class="bdg bdg-a">${t.parcelas}x</span>` : ''}
        </div>
      </div>`;
    list.appendChild(el);
  });
}

// ================= INTELIGÊNCIA ARTIFICIAL E CHAT =================

function setBubble(html){ document.getElementById('ai-bubble').innerHTML = html; }
function toast(msg, err=false){
  const el = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  document.getElementById('toast-icon').innerHTML = err
    ? `<path d="M2 2l10 10M12 2L2 12" stroke="#f88898" stroke-width="1.6" stroke-linecap="round"/>`
    : `<path d="M2 7l3.5 3.5L12 4" stroke="#5edda8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>`;
  el.className='toast'+(err?' err':'')+' on';
  setTimeout(()=>el.classList.remove('on'), 2800);
}

async function processar(txt){
  const w = document.querySelector('.chat-area');
  const ub = document.createElement('div');
  ub.className='bubble bubble-user'; ub.textContent=txt;
  w.insertBefore(ub, document.getElementById('dots'));
  setTimeout(()=>ub.remove(), 6000);

  document.getElementById('dots').classList.add('on');

  const mesAtual = strMesAno(dataVisualizacao);
  const prompt = `Você é um assistente financeiro. Extraia os dados da compra em JSON.
Responda APENAS JSON, sem markdown. Exemplo: {"produto":"nome","valor":123.45,"tipo":"debito|credito|pix","parcelas":1,"mesAno":"MM/YYYY"}
Hoje estamos visualizando o mês de ${mesAtual}. Se não for dito o mês na mensagem, use ${mesAtual}.`;

  try{
    const r = await fetch(CLAUDE_URL,{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:CLAUDE_MODEL, max_tokens:300, system:prompt,
        messages:[{role:'user', content:txt}]
      })
    });
    const data = await r.json();
    document.getElementById('dots').classList.remove('on');

    const raw = data.content?.[0]?.text || '{}';
    const match = raw.match(/\{[\s\S]*\}/);
    const parsed = JSON.parse(match ? match[0] : '{}');

    // Passa pelo normalizador
    parsed.tipo = normalizarTipo(parsed.tipo);

    if(parsed.erro || !parsed.valor){
      setBubble(`Não entendi. Tente: <b>"paguei 200 no pix na padaria"</b>`);
      return;
    }

    // Adiciona na tela se o mês bater
    if(parsed.mesAno === mesAtual) {
      txns.push(parsed);
      
      // Se tiver na tela de resumo, muda pra aba lista pra ver a compra
      if (fil === 'resumo') {
        document.querySelector('[data-f="todos"]').click();
      } else {
        renderizarTudo();
      }
    }

    const pm = parsed.parcelas>1 ? `, em <b>${parsed.parcelas}x</b>` : '';
    setBubble(`Anotado. <b>${parsed.produto}</b> — <b>${fmt(parsed.valor)}</b>${pm}.`);

    salvarPlanilha(parsed, txt);

  }catch(e){
    document.getElementById('dots').classList.remove('on');
    setBubble('Erro ao processar. Tente novamente.');
  }
}

async function salvarPlanilha(dados, msg){
  try{
    await fetch(SHEETS_URL,{
      method:'POST', mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({...dados, mensagem:msg})
    });
    toast('Salvo na Planilha');
  }catch(e){ toast('Erro ao salvar', true); }
}

function enviar(){
  const el = document.getElementById('msg');
  const txt = el.value.trim();
  if(!txt) return;
  el.value=''; el.style.height='';
  processar(txt);
}

document.getElementById('btn-send').addEventListener('click', enviar);
document.getElementById('msg').addEventListener('keydown', e=>{
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); enviar(); }
});
document.getElementById('msg').addEventListener('input', function(){
  this.style.height=''; this.style.height=Math.min(this.scrollHeight,96)+'px';
});

// Controle de Abas e Dashboard
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    
    fil = t.dataset.f;
    
    if (fil === 'resumo') {
      document.getElementById('txn-list').style.display = 'none';
      document.getElementById('empty').style.display = 'none';
      document.getElementById('dashboard').classList.add('active');
    } else {
      document.getElementById('dashboard').classList.remove('active');
      renderizarTudo();
    }
  });
});
